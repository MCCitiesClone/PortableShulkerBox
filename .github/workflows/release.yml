name: Build & Release

on:
  push:
    branches: [master]

# Allow the workflow to create tags and releases.
permissions:
  contents: write

# Prevent overlapping runs from creating conflicting tags/releases.
concurrency:
  group: release
  cancel-in-progress: false

jobs:
  build-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # need full history/tags for version bumping

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Compute next version
        id: version
        run: |
          set -euo pipefail
          # Source-of-truth fallback from build.gradle.kts (used on the very first release).
          source_version="$(grep -oP '(?<=^version = \(findProperty\("pluginVersion"\) as String\?\) \?: ")[^"]+' build.gradle.kts)"
          latest="$(git tag -l 'v*' --sort=-v:refname | head -n1)"
          if [ -z "$latest" ]; then
            new_version="$source_version"
          else
            base="${latest#v}"
            IFS='.' read -r major minor patch <<< "$base"
            new_version="${major}.${minor}.$((patch + 1))"
          fi
          echo "Latest tag: ${latest:-<none>}  ->  New version: $new_version"
          echo "version=$new_version" >> "$GITHUB_OUTPUT"
          echo "tag=v$new_version" >> "$GITHUB_OUTPUT"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build jar
        run: ./gradlew build -PpluginVersion=${{ steps.version.outputs.version }}

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh release create "${{ steps.version.outputs.tag }}" \
            build/libs/PortableShulkerBox-${{ steps.version.outputs.version }}.jar \
            --target "${{ github.sha }}" \
            --title "${{ steps.version.outputs.tag }}" \
            --generate-notes
